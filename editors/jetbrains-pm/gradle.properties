# Opt out of bundling the Kotlin stdlib into the plugin jar — the target
# IDE already provides one, and shipping a newer copy risks classloader
# skew against the platform's own Kotlin runtime.
# https://jb.gg/intellij-platform-kotlin-stdlib
kotlin.stdlib.default.dependency=false

org.gradle.configuration-cache=true
org.gradle.caching=true

# JAVA_HOME must be set to a JDK before running ./gradlew (see
# settings.gradle.kts). Do NOT set org.gradle.java.home here — it is
# machine-specific and must not be committed; use an env var or an
# uncommitted local gradle.properties override instead.
